<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClaudeBar Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 20px;
      font-size: 13px;
    }
    h2 { color: #f0c040; font-size: 15px; margin-bottom: 16px; }
    .row { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
    select {
      width: 100%;
      padding: 8px 10px;
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
    }
    select:focus { outline: none; border-color: #f0c040; }
    .hint { font-size: 11px; color: #666; margin-top: 3px; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .toggle-row label { color: #ccc; font-size: 13px; margin: 0; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444; border-radius: 20px;
      transition: 0.2s;
    }
    .toggle .slider:before {
      content: ''; position: absolute;
      height: 14px; width: 14px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #f0c040; }
    .toggle input:checked + .slider:before { transform: translateX(16px); }
    .info { font-size: 12px; color: #666; margin-top: 16px; padding-top: 12px; border-top: 1px solid #333; }
  </style>
</head>
<body>
  <h2>⚙  Settings</h2>

  <div class="row">
    <label>Refresh Interval</label>
    <select id="pollInterval">
      <option value="60000">Every 1 minute</option>
      <option value="120000">Every 2 minutes</option>
      <option value="300000">Every 5 minutes</option>
      <option value="900000">Every 15 minutes</option>
      <option value="1800000">Every 30 minutes</option>
    </select>
    <div class="hint">How often to poll for new usage data</div>
  </div>

  <div class="row">
    <label>Display Mode</label>
    <select id="displayMode">
      <option value="remaining">Show % remaining</option>
      <option value="used">Show % used</option>
    </select>
  </div>

  <div class="info">
    <strong>Data sources:</strong><br>
    Primary: OAuth API (reads <code>~/.claude/.credentials.json</code>)<br>
    Fallback: <code>claude /usage</code> CLI output<br><br>
    <strong>Token:</strong> Auto-read from Claude CLI on every poll.
  </div>

  <script>
    async function init() {
      const s = await window.api.getSettings();
      document.getElementById('pollInterval').value = s.pollIntervalMs || 300000;
      document.getElementById('displayMode').value = s.displayMode || 'remaining';
    }
    document.getElementById('pollInterval').addEventListener('change', save);
    document.getElementById('displayMode').addEventListener('change', save);
    async function save() {
      const s = {
        pollIntervalMs: parseInt(document.getElementById('pollInterval').value, 10),
        displayMode: document.getElementById('displayMode').value
      };
      await window.api.saveSettings(s);
    }
    init();
  </script>
</body>
</html>
